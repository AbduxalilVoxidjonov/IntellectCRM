# IntellectCRM — prod: app (API + SPA) + PostgreSQL + Cloudflare Tunnel + kunlik backup.
# Bitta o'quv markazi (multi-tenant YO'Q). Sozlamalar .env faylidan keladi (.env.example dan nusxa oling).
# Diqqat: app porti TASHQARIGA OCHILMAGAN — unga faqat cloudflared (ichki tarmoq) kiradi.
# PostgreSQL yengil — 1GB RAM serverga ham sig'adi (SQL Server >=2GB talab qilardi).

services:
  postgres:
    image: postgres:16-alpine
    container_name: intellectcrm-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-intellectcrm}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-intellectcrm}"
    volumes:
      - postgres-data:/var/lib/postgresql/data   # baza shu volume'da (deploylar oralig'ida saqlanadi)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-intellectcrm} -d ${POSTGRES_DB:-intellectcrm}"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 40s
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        VITE_ROOT_DOMAIN: "${ROOT_DOMAIN}"   # frontend domenni shu qiymatga nisbatan aniqlaydi
        VITE_USE_MOCK: "false"
    container_name: intellectcrm-app
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-intellectcrm};Username=${POSTGRES_USER:-intellectcrm};Password=${POSTGRES_PASSWORD}"
      Tenancy__RootDomain: "${ROOT_DOMAIN}"
      App__Host: "${APP_HOST}"             # FAQAT shu host ilovani (SPA) ochadi; qolganlari -> landing
      Jwt__Key: "${JWT_KEY}"               # >=32 belgi; prod'da MAJBURIY
      # AI Tahlil (Gemini) modeli — kalit CRM Sozlamalaridan kiritiladi, model esa shu env'dan.
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-3.1-flash-lite}"
      # ====== Integratsiyalar (.env -> CenterMeta, ENV-WINS) ======
      # Quyidagilarda berilgan qiymat DB'dagidan ustun (har deploy'da qo'llanadi) — UI'da "Saqlash"
      # bosish shart emas. Bo'sh qoldirilgani UI'dan boshqariladi. Bo'sh qiymatlar e'tiborsiz.
      # Telegram bot:
      Telegram__BotToken: "${TELEGRAM_BOT_TOKEN:-}"
      Telegram__BotUsername: "${TELEGRAM_BOT_USERNAME:-}"
      Telegram__BotName: "${TELEGRAM_BOT_NAME:-}"
      Telegram__Channel: "${TELEGRAM_CHANNEL:-}"
      Telegram__AdminChatId: "${TELEGRAM_ADMIN_CHAT_ID:-}"
      # Push (Firebase) — service account JSON (bir qatorli):
      Fcm__ServiceAccountJson: "${FCM_SERVICE_ACCOUNT_JSON:-}"
      # AI Tahlil (Gemini) kaliti:
      Gemini__ApiKey: "${GEMINI_API_KEY:-}"
      # Speaking (Azure):
      Azure__SpeechKey: "${AZURE_SPEECH_KEY:-}"
      Azure__SpeechRegion: "${AZURE_SPEECH_REGION:-}"
      # SMS (Eskiz.uz) — login/parol/sender:
      Eskiz__Email: "${ESKIZ_EMAIL:-}"
      Eskiz__Password: "${ESKIZ_PASSWORD:-}"
      Eskiz__From: "${ESKIZ_FROM:-4546}"
      # Turniket / FaceID:
      Turnstile__Enabled: "${TURNSTILE_ENABLED:-}"
      Turnstile__Vendor: "${TURNSTILE_VENDOR:-}"
      Turnstile__Host: "${TURNSTILE_HOST:-}"
      Turnstile__Port: "${TURNSTILE_PORT:-}"
      Turnstile__Username: "${TURNSTILE_USERNAME:-}"
      Turnstile__Password: "${TURNSTILE_PASSWORD:-}"
      # Call Center — MoiZvonki (bulutli telefoniya: operator telefonidagi ilova + SIM).
      # Webhook avto-obuna APP_HOST orqali.
      MoiZvonki__Enabled: "${MOIZVONKI_ENABLED:-false}"
      MoiZvonki__Domain: "${MOIZVONKI_DOMAIN:-}"
      MoiZvonki__UserName: "${MOIZVONKI_USERNAME:-}"
      MoiZvonki__ApiKey: "${MOIZVONKI_API_KEY:-}"
      MoiZvonki__WebhookSecret: "${MOIZVONKI_WEBHOOK_SECRET:-}"
      # Kamera / to'lov eslatmasi / kunlik AI tahlil / backup (yoqish-o'chirish + vaqt):
      Camera__Enabled: "${CAMERA_ENABLED:-}"
      PaymentReminders__Enabled: "${PAYMENT_REMINDERS_ENABLED:-}"
      AiAnalysis__Enabled: "${AI_ANALYSIS_ENABLED:-}"
      AiAnalysis__Hour: "${AI_ANALYSIS_HOUR:-}"
      Backup__TelegramEnabled: "${BACKUP_TELEGRAM_ENABLED:-}"
      Backup__Hour: "${BACKUP_HOUR:-}"
      Backup__Minute: "${BACKUP_MINUTE:-}"
      # Birinchi ishga tushishda (baza bo'sh bo'lsa) shu login/parol bilan super admin yaratiladi.
      Seed__OwnerLogin: "${OWNER_LOGIN:-admin}"
      Seed__OwnerPassword: "${OWNER_PASSWORD}"
      # EF Core migratsiya retry'lari — 1GB RAM server'da startup sekin bo'lishi mumkin
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_OPERATIONS: "true"
    volumes:
      - uploads:/app/uploads               # yuklangan fayllar (rasm, hujjat)
      - dpkeys:/app/keys                   # DataProtection kalitlari — deploylar oralig'ida saqlanadi
      # CTI (Local Call) audio yozuvlari — ATAYIN /uploads (ochiq statik) ostida EMAS,
      # faqat autentifikatsiyalangan /api/cti/calls/{id}/audio orqali beriladi.
      - cti-recordings:/app/recordings
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Diqqat: bu yerda `ports:` YO'Q — internetga ochilmaydi (faqat cloudflared kiradi).

  # Kamera media-shlyuzi: IP kameralar RTSP oqimini brauzer ko'radigan HLS ga o'giradi.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: intellectcrm-mediamtx
    environment:
      MTX_API: "yes"
      MTX_HLS: "yes"
      MTX_PLAYBACK: "yes"
      MTX_HLSVARIANT: "mpegts"
      MTX_PATHDEFAULTS_RECORDPATH: "/recordings/%path/%Y-%m-%d_%H-%M-%S-%f"
    volumes:
      - cam-recordings:/recordings
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: intellectcrm-tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
      # QUIC (UDP) edge ulanishi uzilib qolmasligi uchun HTTP/2 (TCP) — barqarorroq.
      TUNNEL_TRANSPORT_PROTOCOL: "http2"
    depends_on:
      - app
    restart: unless-stopped

  # Kunlik backup — Postgres dump (.sql.gz) + FAYL volume'lari (uploads + CTI audio, .tar.gz).
  # Ixtiyoriy: SHIFRLASH (BACKUP_ENCRYPT_PASSPHRASE -> .gpg) va OFF-SITE nusxa (RCLONE_REMOTE ->
  # S3/R2/Google Drive va h.k.). Ikkalasi ham bo'sh bo'lsa — faqat lokal (eski xatti-harakat).
  # DIQQAT (falokatdan tiklanish): faqat lokal backup xavfli — disk/server yo'qolsa baza+backup birga
  # yo'qoladi. Off-site (3-2-1 qoidasi) va shifrlashni yoqing — batafsil DEPLOY.md.
  backup:
    image: postgres:16-alpine
    container_name: intellectcrm-backup
    environment:
      PGHOST: postgres
      PGUSER: "${POSTGRES_USER:-intellectcrm}"
      PGPASSWORD: "${POSTGRES_PASSWORD}"
      PGDATABASE: "${POSTGRES_DB:-intellectcrm}"
      BACKUP_HOUR: "${BACKUP_HOUR:-21}"        # Soat (UTC). 21 = 02:00 Toshkent (kechasi). .env'dan o'zgartiriladi.
      BACKUP_MINUTE: "${BACKUP_MINUTE:-0}"     # Daqiqa (UTC). Masalan 30 -> 21:30 UTC. .env'dan o'zgartiriladi.
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-7}"     # kundan eski LOKAL nusxalar o'chiriladi
      # Ixtiyoriy — SHIFRLASH: bo'sh bo'lmasa har nusxa gpg (AES-256) bilan shifrlanadi (.gpg).
      # Tiklashda shu parol kerak — uni XAVFSIZ (parol menejeri) saqlang, serverda EMAS!
      BACKUP_ENCRYPT_PASSPHRASE: "${BACKUP_ENCRYPT_PASSPHRASE:-}"
      # Ixtiyoriy — OFF-SITE: rclone remote (masalan "r2:intellectcrm-backups"). Bo'sh -> off-site yo'q.
      RCLONE_REMOTE: "${RCLONE_REMOTE:-}"
      RCLONE_CONFIG: "/config/rclone.conf"
    volumes:
      - postgres-backups:/backups
      - uploads:/data/uploads:ro                # yuklangan fayllar (rasm/hujjat) — o'qish uchun
      - cti-recordings:/data/recordings:ro      # CTI audio yozuvlari — o'qish uchun
      - ./backup-config:/config:ro              # ixtiyoriy: rclone.conf (off-site uchun). Bo'sh bo'lsa — e'tiborsiz.
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -u
        RET="$${BACKUP_RETENTION_DAYS:-7}"; ENC="$${BACKUP_ENCRYPT_PASSPHRASE:-}"; REMOTE="$${RCLONE_REMOTE:-}"
        # Kerakli vositalarni FAQAT sozlangan bo'lsa o'rnatamiz (shifr -> gnupg, off-site -> rclone).
        if [ -n "$$ENC" ] || [ -n "$$REMOTE" ]; then
          apk add --no-cache gnupg rclone >/dev/null 2>&1 || echo "[backup] OGOHLANTIRISH: vosita o'rnatilmadi (tarmoq?)"
        fi
        bm=$$(printf '%02d' "$${BACKUP_MINUTE:-0}" 2>/dev/null || echo "$${BACKUP_MINUTE}")
        echo "[backup] xizmat: har kuni $${BACKUP_HOUR:-21}:$$bm UTC | lokal saqlash $$RET kun | shifr: $$([ -n "$$ENC" ] && echo ON || echo OFF) | off-site: $$([ -n "$$REMOTE" ] && echo "$$REMOTE" || echo OFF)"
        last=""
        while true; do
          H=$$(date -u +%H); M=$$(date -u +%M); D=$$(date -u +%Y%m%d)
          now=$$(( 10#$$H * 60 + 10#$$M ))
          target=$$(( 10#$${BACKUP_HOUR:-21} * 60 + 10#$${BACKUP_MINUTE:-0} ))
          if [ "$$last" != "$$D" ] && [ "$$now" -ge "$$target" ] && [ "$$now" -lt "$$(( target + 10 ))" ]; then
            last="$$D"; ts=$$(date -u +%Y%m%d_%H%M)
            db="/backups/intellectcrm_$${ts}.sql.gz"; files="/backups/intellectcrm_$${ts}_files.tar.gz"
            echo "[backup] $$ts — baza dump..."
            pg_dump | gzip > "$$db" || { echo "[backup] XATO: pg_dump"; rm -f "$$db"; }
            echo "[backup] $$ts — fayllar (uploads + cti audio)..."
            tar czf "$$files" -C /data uploads recordings 2>/dev/null || { echo "[backup] OGOHLANTIRISH: fayllar tar xato"; rm -f "$$files"; }
            # Shifrlash (parol berilgan bo'lsa) — natija .gpg, asl fayl o'chiriladi.
            if [ -n "$$ENC" ]; then
              for f in "$$db" "$$files"; do
                [ -f "$$f" ] || continue
                if gpg --batch --yes --passphrase "$$ENC" -c "$$f"; then rm -f "$$f"; else echo "[backup] XATO: shifrlash $$f"; fi
              done
            fi
            # Off-site nusxa (rclone remote berilgan bo'lsa).
            if [ -n "$$REMOTE" ]; then
              if rclone copy /backups "$$REMOTE" --include "intellectcrm_$${ts}*" --transfers 2 2>&1; then
                echo "[backup] off-site OK -> $$REMOTE"
              else
                echo "[backup] XATO: off-site nusxa ($$REMOTE)"
              fi
            fi
            find /backups -name 'intellectcrm_*' -type f -mtime +$$RET -delete
            echo "[backup] $$ts tugadi."
          fi
          sleep 60
        done

volumes:
  postgres-data:
  postgres-backups:
  uploads:
  dpkeys:
  cam-recordings:
  cti-recordings:
