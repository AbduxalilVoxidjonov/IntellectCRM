# IntellectCRM — prod: app (API + SPA) + PostgreSQL + Cloudflare Tunnel + kunlik backup.
# Bitta o'quv markazi (multi-tenant YO'Q). Sozlamalar .env faylidan keladi (.env.example dan nusxa oling).
# Diqqat: app porti TASHQARIGA OCHILMAGAN — unga faqat cloudflared (ichki tarmoq) kiradi.
# PostgreSQL yengil — 1GB RAM serverga ham sig'adi (SQL Server >=2GB talab qilardi).

services:
  postgres:
    image: postgres:16-alpine
    container_name: intellectcrm-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-intellectcrm}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-intellectcrm}"
    volumes:
      - postgres-data:/var/lib/postgresql/data   # baza shu volume'da (deploylar oralig'ida saqlanadi)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-intellectcrm} -d ${POSTGRES_DB:-intellectcrm}"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 40s
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        VITE_ROOT_DOMAIN: "${ROOT_DOMAIN}"   # frontend domenni shu qiymatga nisbatan aniqlaydi
        VITE_USE_MOCK: "false"
    container_name: intellectcrm-app
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-intellectcrm};Username=${POSTGRES_USER:-intellectcrm};Password=${POSTGRES_PASSWORD}"
      Tenancy__RootDomain: "${ROOT_DOMAIN}"
      App__Host: "${APP_HOST}"             # FAQAT shu host ilovani (SPA) ochadi; qolganlari -> landing
      Jwt__Key: "${JWT_KEY}"               # >=32 belgi; prod'da MAJBURIY
      # Birinchi ishga tushishda (baza bo'sh bo'lsa) shu login/parol bilan super admin yaratiladi.
      Seed__OwnerLogin: "${OWNER_LOGIN:-admin}"
      Seed__OwnerPassword: "${OWNER_PASSWORD}"
      # EF Core migratsiya retry'lari — 1GB RAM server'da startup sekin bo'lishi mumkin
      DOTNET_SYSTEM_NET_SOCKETS_INLINE_OPERATIONS: "true"
    volumes:
      - uploads:/app/uploads               # yuklangan fayllar (rasm, hujjat)
      - dpkeys:/app/keys                   # DataProtection kalitlari — deploylar oralig'ida saqlanadi
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Diqqat: bu yerda `ports:` YO'Q — internetga ochilmaydi (faqat cloudflared kiradi).

  # Kamera media-shlyuzi: IP kameralar RTSP oqimini brauzer ko'radigan HLS ga o'giradi.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: intellectcrm-mediamtx
    environment:
      MTX_API: "yes"
      MTX_HLS: "yes"
      MTX_PLAYBACK: "yes"
      MTX_HLSVARIANT: "mpegts"
      MTX_PATHDEFAULTS_RECORDPATH: "/recordings/%path/%Y-%m-%d_%H-%M-%S-%f"
    volumes:
      - cam-recordings:/recordings
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: intellectcrm-tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
      # QUIC (UDP) edge ulanishi uzilib qolmasligi uchun HTTP/2 (TCP) — barqarorroq.
      TUNNEL_TRANSPORT_PROTOCOL: "http2"
    depends_on:
      - app
    restart: unless-stopped

  # Kunlik avtomatik backup — `pg_dump` (gzip, .sql.gz). Har kuni BACKUP_HOUR (UTC) atrofida
  # oladi va BACKUP_RETENTION_DAYS dan eskini o'chiradi. Yengil (postgres-alpine, busybox sh).
  # O'zgarish: Telegram'ga backup yuborish opsional (TELEGRAM_BOT_TOKEN + TELEGRAM_ADMIN_CHAT_ID bo'lsa).
  backup:
    image: postgres:16-alpine
    container_name: intellectcrm-backup
    environment:
      PGHOST: postgres
      PGUSER: "${POSTGRES_USER:-intellectcrm}"
      PGPASSWORD: "${POSTGRES_PASSWORD}"
      PGDATABASE: "${POSTGRES_DB:-intellectcrm}"
      BACKUP_HOUR: "21"              # 21:00 UTC = 02:00 Toshkent (kechasi). Bir xonali soat: "03" (nol bilan).
      BACKUP_RETENTION_DAYS: "7"     # 7 kundan eski nusxalar o'chiriladi
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"  # Telegram Bot API tokeni (ixtiyoriy)
      TELEGRAM_ADMIN_CHAT_ID: "${TELEGRAM_ADMIN_CHAT_ID:-}"  # Admin chat ID (ixtiyoriy)
    volumes:
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[backup] xizmat ishga tushdi; har kuni $${BACKUP_HOUR}:00 UTC da, saqlash $${BACKUP_RETENTION_DAYS} kun"
        last=""
        while true; do
          H=$$(date -u +%H); D=$$(date -u +%Y%m%d)
          if [ "$$H" = "$${BACKUP_HOUR}" ] && [ "$$last" != "$$D" ]; then
            last="$$D"
            ts=$$(date -u +%Y%m%d_%H%M)
            out="/backups/intellectcrm_$${ts}.sql.gz"
            echo "[backup] $$ts — boshlandi"
            if pg_dump | gzip > "$$out"; then
              filesize=$$(stat -f%z "$$out" 2>/dev/null || stat -c%s "$$out" 2>/dev/null || echo "unknown")
              echo "[backup] tugadi: $$out (hajm: $$filesize bayt)"
              
              # Telegram'ga yuborish (optional)
              if [ -n "$${TELEGRAM_BOT_TOKEN}" ] && [ -n "$${TELEGRAM_ADMIN_CHAT_ID}" ]; then
                echo "[backup] Telegram'ga yuborilmoqda..."
                caption="✅ Backup: $$ts (UTC)"
                response=$$(curl -s -X POST \
                  -H "Content-Type: multipart/form-data" \
                  -F "chat_id=$${TELEGRAM_ADMIN_CHAT_ID}" \
                  -F "document=@$$out" \
                  -F "caption=$$caption" \
                  "https://api.telegram.org/bot$${TELEGRAM_BOT_TOKEN}/sendDocument" 2>&1)
                
                if echo "$$response" | grep -q '"ok":true'; then
                  echo "[backup] ✅ Telegram'ga yuborildi"
                else
                  echo "[backup] ⚠️  Telegram xatosi (log: $$response), backup local saqlandi"
                fi
              fi
            else
              echo "[backup] XATO: pg_dump muvaffaqiyatsiz"
              rm -f "$$out"
            fi
            find /backups -name '*.sql.gz' -type f -mtime +$${BACKUP_RETENTION_DAYS} -delete
          fi
          sleep 300
        done

volumes:
  postgres-data:
  postgres-backups:
  uploads:
  dpkeys:
  cam-recordings:
