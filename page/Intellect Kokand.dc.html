<title>Intellect Kokand — Zamonaviy o'quv markazi</title>
<meta name="description" content="Intellect o'quv markazi (Qo'qon): ingliz tili, IELTS, matematika, fizika va boshqa fanlardan tajribali ustozlar bilan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--green:#16a34a;--green-d:#0f5132;--green-l:#22c55e;--mint:#ecfdf5;--mint2:#f0fdf4;--ink:#0c1f17;--muted:#5b6b62;--line:#dcefe3;--amber:#f59e0b}
  html{scroll-behavior:smooth}
  body{font-family:Manrope,system-ui,sans-serif;color:var(--ink);background:#fff;overflow-x:hidden;line-height:1.5}
  ::selection{background:#bbf7d0;color:#0c1f17}
  a{color:inherit}
  img{max-width:100%;display:block}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}
  .sec{padding:clamp(60px,8vw,100px) 0}
  .tag{font-weight:800;color:var(--green);font-size:14px;letter-spacing:1px;text-transform:uppercase}
  .h2{font-family:Sora;font-weight:800;font-size:clamp(28px,3.6vw,42px);letter-spacing:-1px;line-height:1.1;margin-top:12px}
  .center{text-align:center}
  .sub{color:var(--muted);font-size:17px;margin-top:14px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:Manrope;font-weight:700;border:none;cursor:pointer;text-decoration:none;border-radius:14px;transition:transform .15s,box-shadow .2s}
  .btn:active{transform:scale(.97)}
  .btn-pri{background:var(--green);color:#fff;padding:14px 26px;font-size:16px;box-shadow:0 14px 30px -10px var(--green)}
  .btn-ghost{background:#fff;color:var(--green-d);padding:14px 26px;font-size:16px;border:1.5px solid var(--line)}
  .card{background:#fff;border:1px solid var(--line);border-radius:20px}
  .grid{display:grid;gap:20px}
  /* nav */
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  nav{display:flex;align-items:center;gap:22px;padding:14px 0}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)}
  .logo span.mk{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--green-l),var(--green-d));display:grid;place-items:center;color:#fff;font-family:Sora;font-weight:800;font-size:19px}
  .logo span.tx{font-family:Sora;font-weight:800;font-size:19px;letter-spacing:-.3px}
  .navlinks{margin-left:auto;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .navlinks a{text-decoration:none;color:var(--ink);font-weight:600;font-size:15px;white-space:nowrap}
  .navlinks a:hover{color:var(--green)}
  .langsw{display:flex;align-items:center;gap:4px;background:var(--mint);border:1px solid var(--line);border-radius:999px;padding:3px}
  .langsw button{border:none;cursor:pointer;font-family:Manrope;font-weight:700;font-size:12px;padding:6px 11px;border-radius:999px;background:transparent;color:#5b6b62;transition:all .15s}
  .langsw button.on{background:var(--green);color:#fff}
  .burger{display:none;background:var(--mint);border:1px solid var(--line);border-radius:10px;width:42px;height:42px;align-items:center;justify-content:center;cursor:pointer}
  .mob{display:none;flex-direction:column;padding:8px 24px 20px;border-top:1px solid var(--line);background:#fff;gap:4px}
  .mob.open{display:flex}
  .mob a{text-decoration:none;color:var(--ink);font-weight:600;padding:10px 0}
  /* hero */
  .hero{position:relative;background:radial-gradient(120% 90% at 80% -10%,#dcfce7 0%,#f0fdf4 45%,#fff 80%);overflow:hidden}
  .hero .blob{position:absolute;top:-80px;right:-60px;width:380px;height:380px;background:radial-gradient(circle,#86efac55,transparent 70%);border-radius:50%;animation:floaty 9s ease-in-out infinite}
  .herogrid{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center;padding:clamp(56px,8vw,100px) 0 clamp(40px,5vw,64px)}
  .badge{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);color:var(--green-d);font-weight:700;font-size:13px;padding:8px 14px;border-radius:999px;box-shadow:0 4px 14px -8px #16a34a55}
  .badge .dot{width:8px;height:8px;border-radius:50%;background:var(--green-l)}
  h1{font-family:Sora;font-weight:800;font-size:clamp(34px,5.2vw,58px);line-height:1.05;letter-spacing:-1.5px;margin:20px 0 0}
  h1 .hl{color:var(--green)}
  .herostats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .statbox{background:var(--mint2);border:1px solid var(--line);border-radius:14px;padding:14px}
  .statbox .n{font-family:Sora;font-weight:800;font-size:24px;color:var(--green-d)}
  .statbox .l{font-size:13px;color:var(--muted);font-weight:600}
  /* about */
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
  .feat{background:linear-gradient(180deg,#fff,var(--mint2));border:1px solid var(--line);border-radius:18px;padding:22px}
  .feat .n{font-family:Sora;font-weight:800;font-size:30px;color:var(--green)}
  /* advantages / teachers / prices grids */
  .g3{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .g280{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .adv{display:flex;gap:16px;padding:22px}
  .adv .ic{flex:none;width:46px;height:46px;border-radius:13px;background:var(--mint);display:grid;place-items:center}
  .teacher{padding:20px;text-align:center}
  .teacher .ph{width:104px;height:104px;border-radius:50%;margin:0 auto 14px;object-fit:cover;border:3px solid var(--mint);background:var(--mint)}
  .teacher .ph.ini{display:grid;place-items:center;font-family:Sora;font-weight:800;font-size:34px;color:var(--green-d)}
  .teacher .nm{font-family:Sora;font-weight:700;font-size:19px}
  .teacher .ro{color:var(--green);font-weight:700;font-size:14px;margin-top:3px}
  .teacher .bio{color:var(--muted);font-size:14px;margin-top:8px}
  /* results dark */
  .dark{background:linear-gradient(135deg,var(--green-d),#0a3a24);color:#fff}
  .dark .tag{color:var(--green-l)}
  .dark .h2{color:#fff}
  .achbox{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:26px;text-align:center}
  .achbox .n{font-family:Sora;font-weight:800;font-size:clamp(32px,4vw,46px);color:#bbf7d0}
  .achbox .l{font-weight:600;color:#d1fae5;margin-top:4px}
  .quote{max-width:760px;margin:0 auto;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:32px}
  .quote p{font-family:Sora;font-weight:600;font-size:clamp(18px,2.2vw,24px);margin-top:14px;line-height:1.4}
  .quote .by{color:#86efac;font-weight:700;margin-top:14px}
  .certgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  .certgrid .ci{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:12px;cursor:pointer}
  .certgrid .ci img{width:100%;height:230px;object-fit:cover;border-radius:12px}
  /* prices */
  .price{padding:24px;display:flex;flex-direction:column;gap:12px}
  .price .nm{font-family:Sora;font-weight:700;font-size:21px}
  .price .ds{color:var(--muted);font-size:15px;flex:1}
  .price .pr{font-family:Sora;font-weight:800;font-size:26px;color:var(--green-d)}
  .price .pr small{font-size:14px;color:var(--muted);font-weight:600}
  .chip{display:inline-block;background:var(--mint);color:var(--green-d);font-weight:700;font-size:12px;padding:5px 11px;border-radius:999px}
  /* gallery */
  .galgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .galgrid img{width:100%;height:200px;object-fit:cover;border-radius:16px;cursor:pointer;border:1px solid var(--line);transition:transform .2s}
  .galgrid img:hover{transform:scale(1.02)}
  /* vacancies */
  .vacrow{display:flex;align-items:center;gap:20px;flex-wrap:wrap;padding:22px 24px}
  .vacrow .ti{flex:1;min-width:200px}
  .vacrow .ti .t{font-family:Sora;font-weight:700;font-size:19px}
  .vacrow .ti .r{font-size:14px;color:var(--muted);margin-top:4px}
  /* faq */
  .faqi{overflow:hidden}
  .faqi button{width:100%;display:flex;justify-content:space-between;align-items:center;gap:16px;text-align:left;background:none;border:none;padding:20px 22px;cursor:pointer;font-family:Sora;font-weight:600;font-size:17px;color:var(--ink)}
  .faqi .ic{flex:none;width:28px;height:28px;border-radius:8px;background:var(--mint);color:var(--green);display:grid;place-items:center;font-size:22px;transition:transform .25s}
  .faqi.open .ic{transform:rotate(45deg)}
  .faqi .bd{max-height:0;opacity:0;overflow:hidden;transition:max-height .3s,opacity .3s}
  .faqi.open .bd{max-height:300px;opacity:1}
  .faqi .bd div{padding:0 22px 20px;color:var(--muted);font-size:16px}
  /* contact + footer */
  .contactcard{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;text-decoration:none}
  .contactcard .ic{width:46px;height:46px;border-radius:13px;background:var(--mint);display:grid;place-items:center;flex:none}
  footer{background:var(--ink);color:#cfe9da}
  .footgrid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:36px;padding:54px 0 30px}
  footer a{color:#9fc4b1;text-decoration:none}
  /* lightbox */
  .lb{position:fixed;inset:0;z-index:100;background:rgba(8,31,23,.82);display:none;align-items:center;justify-content:center;padding:24px}
  .lb.open{display:flex}
  .lb img{max-width:92vw;max-height:88vh;border-radius:14px}
  .lb .x{position:absolute;top:20px;right:24px;width:44px;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.08);color:#fff;font-size:22px;cursor:pointer}
  @media(max-width:980px){
    .navlinks{display:none}
    .navcta{display:none}
    .burger{display:flex}
    .herogrid{grid-template-columns:1fr;gap:32px}
    .twocol{grid-template-columns:1fr;gap:32px}
    .footgrid{grid-template-columns:1fr;gap:28px}
  }
  @media(max-width:600px){
    .herostats{grid-template-columns:1fr 1fr}
    .vacrow{flex-direction:column;align-items:flex-start}
    .vacrow .btn{width:100%}
  }
</style>
</head>

  document.getElementById('app').innerHTML = html;
  bind();
}

function bind(){
  document.querySelectorAll('[data-lang]').forEach(function(b){b.addEventListener('click',function(){LANG=b.getAttribute('data-lang');menuOpen=false;render()})});
  var burger=document.getElementById('burger'); if(burger) burger.addEventListener('click',function(){menuOpen=!menuOpen;document.getElementById('mob').classList.toggle('open',menuOpen)});
  document.querySelectorAll('[data-close]').forEach(function(a){a.addEventListener('click',function(){menuOpen=false;var m=document.getElementById('mob');if(m)m.classList.remove('open')})});
  document.querySelectorAll('[data-faq]').forEach(function(b){b.addEventListener('click',function(){var i=+b.getAttribute('data-faq');openFaq=(openFaq===i?-1:i);render()})});
  document.querySelectorAll('[data-img]').forEach(function(el){el.addEventListener('click',function(){openLb(el.getAttribute('data-img'))})});
}

function openLb(src){var lb=document.getElementById('lightbox');document.getElementById('lbimg').src=src;lb.classList.add('open')}
document.getElementById('lbx').addEventListener('click',function(){document.getElementById('lightbox').classList.remove('open')});
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target.id==='lightbox')this.classList.remove('open')});

render();
</script>
</body>
