<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#2563EB" />
<title>Parent App — O'quvchi kabineti</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=block" rel="stylesheet" />
<style>
/* ─── Dizayn tokenlari (Flutter AppColors 1:1) ─────────────────── */
:root, [data-theme="light"]{
  --accent:#2563EB; --accentD:#1D4ED8; --accentSoft:#E9F0FF; --onAccent:#fff;
  --bg:#EEF1F8; --surface:#fff; --surface2:#F4F7FC; --surface3:#E9EEF7;
  --text:#0F1729; --muted:#5D6B85; --faint:#98A4BC;
  --border:#E8ECF4; --borderStrong:#DBE1EC;
  --green:#16A34A; --greenSoft:#E7F6EC; --red:#EF4444; --redSoft:#FDEAEA;
  --amber:#F59E0B; --amberSoft:#FDF2E1; --violet:#7C3AED; --violetSoft:#F0E9FF;
  --shadow:0 6px 18px rgba(16,32,67,.06);
}
[data-theme="dark"]{
  --accent:#3B82F6; --accentD:#2563EB; --accentSoft:#18253F; --onAccent:#fff;
  --bg:#0A0F1C; --surface:#131B2D; --surface2:#1A2338; --surface3:#222E48;
  --text:#EEF2FB; --muted:#9AA8C4; --faint:#64718C;
  --border:rgba(255,255,255,.08); --borderStrong:rgba(255,255,255,.14);
  --green:#22C55E; --greenSoft:#11271B; --red:#F87171; --redSoft:#2B1518;
  --amber:#FBBF24; --amberSoft:#2A2110; --violet:#A78BFA; --violetSoft:#211A3A;
  --shadow:0 8px 24px rgba(0,0,0,.30);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Manrope',system-ui,sans-serif; background:var(--bg); color:var(--text);
  font-weight:600; -webkit-font-smoothing:antialiased; overscroll-behavior:none;
}
#app{max-width:480px; margin:0 auto; min-height:100%; min-height:100dvh; background:var(--bg);
  display:flex; flex-direction:column; position:relative; overflow:hidden;}
.ms{font-family:'Material Symbols Rounded'; font-weight:normal; font-style:normal;
  line-height:1; letter-spacing:normal; text-transform:none; display:inline-block;
  white-space:nowrap; direction:ltr; -webkit-font-feature-settings:'liga'; user-select:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;color:inherit;}
::-webkit-scrollbar{width:0;height:0;}

/* layout */
.screen{flex:1; display:flex; flex-direction:column; min-height:0; animation:fade .22s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
.pad{padding:0 16px;}
.h-pad{padding:0 20px;}

/* primitives */
.card{background:var(--surface); border:1px solid var(--border); border-radius:20px;
  box-shadow:var(--shadow); padding:16px;}
.press{transition:transform .12s ease; cursor:pointer;}
.press:active{transform:scale(.975);}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:8px;
  font-size:12px;font-weight:700;}
.row{display:flex;align-items:center;}
.col{display:flex;flex-direction:column;}
.sp{justify-content:space-between;}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.sh{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 10px;}
.sh-title{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.sh-act{display:flex;align-items:center;color:var(--accent);font-size:13.5px;font-weight:700;}
.badge{display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;}
.subj{display:flex;align-items:center;justify-content:center;font-weight:800;}
.progress{height:8px;background:var(--surface3);border-radius:8px;overflow:hidden;}
.progress > div{height:100%;border-radius:8px;transition:width .5s cubic-bezier(.22,1,.36,1);}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;
  border-radius:15px;height:50px;padding:0 20px;font-size:16px;width:100%;}
.btn-lg{height:56px;border-radius:17px;font-size:17px;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 6px 18px rgba(37,99,235,.32);}
.btn-soft{background:var(--accentSoft);color:var(--accent);}
.btn-ghost{background:var(--surface3);color:var(--text);}
.btn-danger{background:var(--redSoft);color:var(--red);}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--borderStrong);}
.btn[disabled]{opacity:.45;pointer-events:none;}
.iconbtn{width:38px;height:38px;border-radius:12px;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;
  justify-content:center;position:relative;flex:none;}
.nbadge{position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;padding:0 4px;
  background:var(--red);color:#fff;border-radius:9px;border:2px solid var(--bg);
  font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.empty{padding:48px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.empty-ic{width:64px;height:64px;border-radius:20px;background:var(--surface3);
  display:flex;align-items:center;justify-content:center;color:var(--faint);margin-bottom:10px;}
.ring{position:relative;display:flex;align-items:center;justify-content:center;flex:none;}
.ring svg{transform:rotate(-90deg);}
.ring-c{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.spin{width:34px;height:34px;border:3px solid var(--surface3);border-top-color:var(--accent);
  border-radius:50%;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
.center{flex:1;display:flex;align-items:center;justify-content:center;}

/* header */
.hd{background:var(--bg);padding:8px 16px;}
.hd.lg{padding:6px 20px 10px;}
.hd-big{font-size:30px;font-weight:800;letter-spacing:-.7px;line-height:1.05;}
.hd-sm{font-size:18px;font-weight:800;letter-spacing:-.3px;}
.hd-sub{font-size:13.5px;font-weight:600;color:var(--muted);}

/* bottom nav */
.tabbar{display:flex;background:var(--surface);border-top:1px solid var(--border);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));flex:none;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;
  color:var(--faint);font-size:10.5px;font-weight:600;}
.tab.on{color:var(--accent);font-weight:800;}

/* segmented */
.seg{display:flex;height:46px;padding:4px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;gap:0;}
.seg > button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  border-radius:11px;font-size:13px;font-weight:700;color:var(--muted);transition:.18s;}
.seg > button.on{background:var(--accent);color:#fff;}
.pill{display:flex;align-items:center;justify-content:center;gap:6px;height:38px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--muted);}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* inputs */
.field{display:flex;align-items:center;gap:10px;height:54px;padding:0 14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:15px;}
.field input{flex:1;border:none;background:none;outline:none;font-size:16px;font-weight:600;}
.ta{width:100%;border:1px solid var(--border);border-radius:16px;background:var(--surface);
  padding:14px;font-size:15px;line-height:1.5;font-weight:600;outline:none;resize:vertical;}
.ta:focus,.field:focus-within{border-color:var(--accent);}

/* sheet / toast */
.scrim{position:fixed;inset:0;background:rgba(8,12,24,.45);z-index:50;display:flex;
  align-items:flex-end;justify-content:center;animation:fade .2s;}
.sheet{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border);
  border-radius:26px 26px 0 0;padding:10px 18px 30px;max-height:84dvh;overflow-y:auto;
  animation:up .26s cubic-bezier(.22,1,.36,1);}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.grab{width:40px;height:5px;background:var(--borderStrong);border-radius:5px;margin:4px auto 14px;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:90;
  background:var(--text);color:var(--bg);padding:12px 18px;border-radius:14px;font-size:13.5px;
  font-weight:700;max-width:90%;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:fade .2s;}
.switch{width:50px;height:30px;border-radius:15px;background:var(--borderStrong);padding:3px;
  display:flex;transition:.2s;flex:none;}
.switch.on{background:var(--accent);justify-content:flex-end;}
.switch > i{width:24px;height:24px;border-radius:50%;background:#fff;display:block;
  box-shadow:0 2px 5px rgba(0,0,0,.25);transition:.2s;}
.hero{border-radius:22px;padding:18px;color:#fff;
  background:linear-gradient(135deg,var(--accent),#5340c4);box-shadow:0 14px 34px rgba(37,99,235,.3);}
.divline{border-bottom:1px solid var(--border);}
a{color:var(--accent);}
</style>
</head>
<body>
<div id="app"><div class="center"><div class="spin"></div></div></div>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════
   Parent App — O'quvchi/Ota-ona kabineti (HTML port of Flutter app)
   Backend: STUDENT_API.md / parent_api.md  →  /api/student/*
   ════════════════════════════════════════════════════════════════ */

/* ─── Konfiguratsiya ──────────────────────────────────────────── */
const CONFIG = {
  // Backend manzili. Boshqa serverga ulash uchun shu yerni o'zgartiring
  // yoki login ekranidagi ⚙ tugmasidan kiriting (localStorage'da saqlanadi).
  baseUrl: localStorage.getItem('lms_base_url') || 'https://intellectschool.uz',
  appName: 'Parent App',
  appVersion: '1.0.0',
};

/* ─── Yordamchilar ────────────────────────────────────────────── */
const $ = (s, r=document) => r.querySelector(s);
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, m =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const el = (html) => { const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; };

const WEEKDAYS=['Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
const WD_SHORT=['Du','Se','Ch','Pa','Ju','Sh'];
const MONTHS=['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];

function fmtMoney(n, withSign=false){
  n = Number(n)||0;
  const abs = Math.round(Math.abs(n));
  let s = String(abs), out='';
  for(let i=0;i<s.length;i++){ if(i>0 && (s.length-i)%3===0) out+=' '; out+=s[i]; }
  const sign = n<0 ? '−' : (withSign && n>0 ? '+' : '');
  return sign+out;
}
function gradeColor(g){
  g=Number(g)||0;
  if(g>=4.5) return '#16A34A';
  if(g>=3.5) return '#2563EB';
  if(g>=2.5) return '#F59E0B';
  return '#EF4444';
}
const SUBJ_PALETTE=['#2563EB','#7C3AED','#0D9488','#DB2777','#EA580C','#B45309','#16A34A','#0891B2','#4F46E5','#65A30D'];
function subjectColor(key){
  key=String(key||'');
  if(!key) return '#64708A';
  let hash=0; for(const ch of key){ hash=(hash*31+ch.charCodeAt(0))&0x7fffffff; }
  return SUBJ_PALETTE[hash % SUBJ_PALETTE.length];
}
const subjInitial = (n) => { n=String(n||'').trim(); return n? n[0].toUpperCase() : '?'; };
function initials(name){
  return String(name||'').trim().split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?';
}
function parseDate(iso){
  if(!iso) return null;
  let s=String(iso).trim(); if(!s) return null;
  let d=new Date(s.length<=10? s+'T00:00:00' : s);
  if(!isNaN(d)) return d;
  const m=s.match(/^(\d{1,2})[./](\d{1,2})[./](\d{4})/);
  if(m){ d=new Date(+m[3], +m[2]-1, +m[1]); if(!isNaN(d)) return d; }
  return null;
}
function fmtDate(iso, weekday=false){
  const d=parseDate(iso); if(!d) return iso||'';
  const wd=(d.getDay()+6)%7;
  let s=`${d.getDate()} ${MONTHS[d.getMonth()]}`;
  if(weekday && wd<6) s+=`, ${WEEKDAYS[wd]}`;
  return s;
}
function fmtDateYear(iso){ const d=parseDate(iso); return d? `${d.getDate()} ${MONTHS[d.getMonth()]}, ${d.getFullYear()}`:''; }
function fmtTime(iso){ const d=parseDate(iso); if(!d) return ''; return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function toMinutes(hhmm){ const p=String(hhmm||'').split(':'); return (+p[0]||0)*60+(+p[1]||0); }
function pick(obj, keys){ for(const k of keys){ const v=obj&&obj[k]; if(v!=null && String(v).trim()) return String(v).trim(); } return null; }

/* prototip ikon nomi → Material Symbols ligaturasi */
const ICONS={home:'home',calendar:'calendar_today',clipboard:'assignment',chat:'forum',user:'person',
  chart:'bar_chart',check:'check',checkCircle:'check_circle',book:'menu_book',wallet:'account_balance_wallet',
  settings:'settings',bell:'notifications',chevR:'chevron_right',chevL:'chevron_left',chevD:'keyboard_arrow_down',
  logout:'logout',eye:'visibility',eyeOff:'visibility_off',send:'send',paperclip:'attach_file',plus:'add',
  search:'search',x:'close',clock:'schedule',sun:'light_mode',moon:'dark_mode',camera:'photo_camera',
  video:'videocam',file:'description',download:'download',edit:'edit',lock:'lock',mail:'mail',phone:'call',
  award:'emoji_events',flame:'local_fire_department',info:'info',alert:'warning',sparkle:'auto_awesome',
  refresh:'refresh',wifiOff:'wifi_off',grid:'grid_view',list:'format_list_bulleted',arrowR:'arrow_forward',
  upload:'upload_file',food:'restaurant',feedback:'rate_review',image:'image',gallery:'photo_library',
  trash:'delete',school:'school',mapPin:'location_on',crosshair:'my_location',map:'map',telegram:'send',
  shield:'verified_user',car:'directions_car',bus:'directions_bus'};
function icon(name, size=22, color){
  return `<span class="ms" style="font-size:${size}px${color?`;color:${color}`:''}">${ICONS[name]||'radio_button_unchecked'}</span>`;
}

/* ─── API klient ──────────────────────────────────────────────── */
const Store = {
  get token(){ return localStorage.getItem('lms_token'); },
  set token(v){ v? localStorage.setItem('lms_token',v) : localStorage.removeItem('lms_token'); },
  get user(){ try{ return JSON.parse(localStorage.getItem('lms_user')||'null'); }catch(e){ return null; } },
  set user(v){ v? localStorage.setItem('lms_user',JSON.stringify(v)) : localStorage.removeItem('lms_user'); },
  get theme(){ return localStorage.getItem('lms_theme')||'light'; },
  set theme(v){ localStorage.setItem('lms_theme',v); },
  get lang(){ return localStorage.getItem('lms_lang')||'uz'; },
  set lang(v){ localStorage.setItem('lms_lang',v); },
};

class ApiError extends Error{ constructor(status,msg){ super(msg); this.status=status; } }

const api = {
  abs(path){ if(/^https?:\/\//.test(path)) return path; const b=CONFIG.baseUrl.replace(/\/$/,''); return path.startsWith('/')? b+path : b+'/'+path; },
  authHeaders(){ const t=Store.token; return t? {'Authorization':'Bearer '+t} : {}; },
  async _req(method, path, {body, query, headers, form, raw}={}){
    let url = this.abs(path);
    if(query){ const q=new URLSearchParams(); for(const k in query){ if(query[k]!=null) q.append(k,query[k]); } const s=q.toString(); if(s) url+='?'+s; }
    const h = Object.assign({}, this.authHeaders(), headers||{});
    let payload;
    if(form){ payload=form; }
    else if(body!=null){ h['Content-Type']='application/json'; payload=JSON.stringify(body); }
    let res;
    try{
      res = await fetch(url, {method, headers:h, body:payload});
    }catch(e){
      throw new ApiError(null, "Serverga ulanib bo'lmadi. Internet va manzilni tekshiring. (CORS bo'lishi mumkin)");
    }
    if(res.status===401){ onUnauthorized(); }
    let data=null;
    const ct=res.headers.get('content-type')||'';
    if(ct.includes('application/json')){ try{ data=await res.json(); }catch(e){} }
    else { try{ const t=await res.text(); data = t? {message:t}:null; }catch(e){} }
    if(raw) return {status:res.status, data};
    if(res.status>=400){
      const msg = (data && data.message) ? data.message : `Xatolik (${res.status})`;
      throw new ApiError(res.status, msg);
    }
    return data;
  },
  get(p,q){ return this._req('GET',p,{query:q}); },
  post(p,body,q){ return this._req('POST',p,{body,query:q}); },
  put(p,body){ return this._req('PUT',p,{body}); },
  del(p,q){ return this._req('DELETE',p,{query:q}); },

  /* Auth */
  async login(email,password,tenant){
    const r = await this._req('POST','/api/auth/login',{body:{email,password}, headers: tenant?{'X-Tenant':tenant}:null, raw:true});
    const {status,data}=r;
    if(status===409 && data && Array.isArray(data.schools)){
      const err=new Error('multi'); err.schools=data.schools.map(s=>({slug:s.slug||s.tenant||s.code||'', name:s.name||s.title||s.fullName||s.slug||''})); err.multi=true; throw err;
    }
    if(status>=400){ throw new ApiError(status, (data&&data.message)||`Login amalga oshmadi (${status})`); }
    return data;
  },
  changePassword(currentPassword,newPassword){ return this.put('/api/student/password',{currentPassword,newPassword}); },
  /* Data */
  dashboard(){ return this.get('/api/student/dashboard'); },
  meta(){ return this.get('/api/student/meta'); },
  profile(){ return this.get('/api/student/me'); },
  school(){ return this.get('/api/student/school'); },
  grades(){ return this.get('/api/student/grades'); },
  notebook(){ return this.get('/api/student/notebook'); },
  schedule(q){ return this.get('/api/student/schedule', q); },
  attendance(quarter){ return this.get('/api/student/attendance', quarter?{quarter}:null); },
  finance(){ return this.get('/api/student/finance'); },
  chat(since){ return this.get('/api/student/chat', since?{since}:null); },
  sendChat(text){ return this.post('/api/student/chat',{text}); },
  assignments(){ return this.get('/api/student/assignments'); },
  assignment(id){ return this.get('/api/student/assignments/'+id); },
  submitTest(id,answers){ return this.post(`/api/student/assignments/${id}/submit`,{answers}); },
  submitWritten(id,answerText){ return this.post(`/api/student/assignments/${id}/submit`,{answerText}); },
  submitFile(id,fileUrl){ return this.post(`/api/student/assignments/${id}/submit`,{fileUrl}); },
  upload(file, onProgress){
    return new Promise((resolve,reject)=>{
      const fd=new FormData(); fd.append('file', file, file.name);
      const xhr=new XMLHttpRequest();
      xhr.open('POST', this.abs('/api/student/uploads'));
      const t=Store.token; if(t) xhr.setRequestHeader('Authorization','Bearer '+t);
      xhr.upload.onprogress=(e)=>{ if(e.lengthComputable && onProgress) onProgress(e.loaded/e.total); };
      xhr.onload=()=>{ try{ const d=JSON.parse(xhr.responseText||'{}'); if(xhr.status<400) resolve(d); else reject(new ApiError(xhr.status, d.message||'Yuklab bo\'lmadi')); }catch(e){ reject(new ApiError(xhr.status,'Yuklab bo\'lmadi')); } };
      xhr.onerror=()=>reject(new ApiError(null,'Serverga ulanib bo\'lmadi'));
      xhr.send(fd);
    });
  },
  settings(){ return this.get('/api/student/settings'); },
  saveSettings(b){ return this.put('/api/student/settings', b); },
  subjectsProgress(quarter){ return this.get('/api/student/subjects-progress', quarter?{quarter}:null); },
  subjectProgressDetail(id,quarter){ return this.get('/api/student/subjects-progress/'+id, quarter?{quarter}:null); },
  assignmentScores(){ return this.get('/api/student/assignment-scores'); },
  rating(){ return this.get('/api/student/rating'); },
  lmsCourses(){ return this.get('/api/student/lms/subjects'); },
  lmsModules(id){ return this.get(`/api/student/lms/subjects/${id}/modules`); },
  lmsTopic(id){ return this.get('/api/student/lms/topics/'+id); },
  lmsComplete(id){ return this.post(`/api/student/lms/topics/${id}/complete`); },
  canteen(date){ return this.get('/api/student/canteen/'+date); },
  sendFeedback(type,text,file,onProgress){
    return new Promise((resolve,reject)=>{
      const fd=new FormData(); fd.append('type',type); fd.append('text',text);
      if(file) fd.append('image',file,file.name);
      const xhr=new XMLHttpRequest();
      xhr.open('POST', this.abs('/api/student/feedback'));
      const t=Store.token; if(t) xhr.setRequestHeader('Authorization','Bearer '+t);
      xhr.upload.onprogress=(e)=>{ if(e.lengthComputable&&onProgress&&file) onProgress(e.loaded/e.total); };
      xhr.onload=()=>{ if(xhr.status<400) resolve(); else { let m='Yuborilmadi'; try{m=JSON.parse(xhr.responseText).message||m;}catch(e){} reject(new ApiError(xhr.status,m)); } };
      xhr.onerror=()=>reject(new ApiError(null,'Serverga ulanib bo\'lmadi'));
      xhr.send(fd);
    });
  },
  location(){ return this.get('/api/student/location'); },
  updateLocation(b){ return this.put('/api/student/location', b); },
  buses(){ return this.get('/api/student/buses'); },

function Ring(value, size=72, stroke=8, color, inner=''){
  value=Math.max(0,Math.min(100,Number(value)||0));
  const r=(size-stroke)/2, circ=2*Math.PI*r, off=circ*(1-value/100);
  color=color||'var(--accent)';
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
        style="transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1)"/>
    </svg>
    <div class="ring-c">${inner}</div></div>`;
}
function progressBar(v, color, h=8){
  color=color||'var(--accent)';
  return `<div class="progress" style="height:${h}px"><div style="width:${Math.max(0,Math.min(100,v))}%;background:${color}"></div></div>`;
}
function chip(text, color, fontSize=12){
  return `<span class="chip" style="color:${color};background:color-mix(in srgb,${color} 12%,transparent);font-size:${fontSize}px">${text}</span>`;
}
function gradeChip(grade, size=30){
  const col=gradeColor(grade);
  const label = grade===Math.round(grade)? String(Math.round(grade)) : Number(grade).toFixed(1);
  return `<div class="badge" style="width:${size}px;height:${size}px;border-radius:${size*.32}px;
    background:color-mix(in srgb,${col} 16%,var(--surface));color:${col};font-size:${size*.5}px">${label}</div>`;
}
function subjectBadge(name, color, size=42, radius=13){
  return `<div class="subj" style="width:${size}px;height:${size}px;border-radius:${radius}px;flex:none;
    background:color-mix(in srgb,${color} 15%,var(--surface));color:${color};font-size:${size*.42}px">${esc(subjInitial(name))}</div>`;

function avatar(name, size=44, photoUrl, ring=false){

/* Himoyalangan rasmlarni Bearer bilan yuklab fonga qo'yamiz (img Authorization yubora olmaydi) */
function mountPhotos(root){
  root.querySelectorAll('[data-photo]').forEach(async (node)=>{
    const url=node.getAttribute('data-photo'); node.removeAttribute('data-photo');
    try{
      const r=await fetch(api.abs(url), {headers:api.authHeaders()});
      if(!r.ok) return; const b=await r.blob(); const u=URL.createObjectURL(b);
      node.style.backgroundImage=`url(${u})`; node.style.backgroundSize='cover';
      node.style.backgroundPosition='center'; node.textContent='';
    }catch(e){/* initsiallarda qoladi */}
  });

/* ─── Toast & Sheet ───────────────────────────────────────────── */
let toastTimer;
function toast(msg){
  $('.toast')?.remove(); clearTimeout(toastTimer);
  const t=el(`<div class="toast">${esc(msg)}</div>`); document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(), 2800);
}
function sheet(title, contentHtml, wire){
  const scrim=el(`<div class="scrim"><div class="sheet"><div class="grab"></div>
    <div style="font-size:19px;font-weight:800;letter-spacing:-.3px;margin-bottom:14px">${esc(title)}</div>
    <div class="sheet-body">${contentHtml}</div></div></div>`);
  const close=()=>scrim.remove();
  scrim.addEventListener('click',(e)=>{ if(e.target===scrim) close(); });
  document.body.appendChild(scrim);
  mountPhotos(scrim);
  if(wire) wire(scrim, close);
  return close;
}

/* ════════════════════════════════════════════════════════════════
   Navigatsiya (5 tab + push-stack)
   ════════════════════════════════════════════════════════════════ */
const TABS=[['home','Boshqaruv'],['chart','Progress'],['clipboard','Topshiriq'],['chat','Chat'],['user','Profil']];
const nav = {
  tab:0, stack:[],
  root:()=>$('#app'),
  go(view, params){ this.stack.push({view, params}); this._cleanup(); history.pushState({d:this.stack.length},''); this.render(); },
  pop(){ if(this.stack.length){ this.stack.pop(); this._cleanup(); this.render(); } },
  setTab(i){ this.stack=[]; this.tab=i; this._cleanup(); this.render(); window.scrollTo(0,0); },
  _cleanup(){ if(this._onLeave){ try{this._onLeave();}catch(e){} this._onLeave=null; } },
  async render(){
    const app=this.root();
    const top = this.stack[this.stack.length-1];
    if(top){
      await mountView(app, top.view, top.params, false);
    } else {
      // tab root + bottom nav
      app.innerHTML=`<div class="screen" id="tabscreen">${loadingScreen()}</div>
        <div class="tabbar">${TABS.map((t,i)=>`<button class="tab ${i===this.tab?'on':''} press" data-tab="${i}">
          ${icon(t[0],24, i===this.tab?'var(--accent)':'var(--faint)')}<span>${t[1]}</span></button>`).join('')}</div>`;
      app.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>this.setTab(+b.dataset.tab));
      const target=$('#tabscreen', app);
      const view=[Dashboard,Progress,Assignments,Chat,Profile][this.tab];
      await mountView(target, view, null, true);
    }
  }
};
window.addEventListener('popstate', ()=>{ if(nav.stack.length) nav.pop(); });

// Har bir "view" = async funksiya(container, params): DOM ichini to'ldiradi.
async function mountView(container, view, params, isTab){
  try{ await view(container, params); }
  catch(e){ container.innerHTML = isTab? `<div class="screen">${errorScreen(e)}</div>` : errorScreen(e); }
  // umumiy: back tugmalari
  container.querySelectorAll('[data-act="back"]').forEach(b=>b.onclick=()=>nav.pop());
  mountPhotos(container);
}

/* Pickup tugmasi */
async function mountPickup(slot, studentId){
  if(!slot) return;
  let status=null;
  try{ status=await api.pickupStatus(studentId); }catch(e){}
  const isToday=(iso)=>{ const d=parseDate(iso); if(!d) return false; const n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); };
  function render(){
    if(status && status.status==='accepted' && isToday(status.acceptedAt||status.createdAt)){
      slot.innerHTML=`<div class="card" style="background:var(--greenSoft);border-color:color-mix(in srgb,var(--green) 25%,transparent);box-shadow:none"><div class="row gap12">
        ${icon('checkCircle',24,'var(--green)')}<div style="flex:1"><div style="font-weight:800;color:var(--green)">Ruxsat berildi</div>
        <div class="muted" style="font-size:12.5px">${esc(status.acceptedByName||'Sinf rahbari')} tasdiqladi</div></div></div></div>`;
      return;
    }
    if(status && status.status==='pending'){
      slot.innerHTML=`<div class="card" style="background:var(--amberSoft);border-color:color-mix(in srgb,var(--amber) 25%,transparent);box-shadow:none"><div class="row gap12">
        ${icon('clock',24,'var(--amber)')}<div style="flex:1"><div style="font-weight:800;color:var(--amber)">So‘rov yuborildi</div>
        <div class="muted" style="font-size:12.5px">Sinf rahbari tasdiqlashini kuting</div></div>
        <button class="press" data-r="1">${icon('refresh',20,'var(--muted)')}</button></div></div>`;
      slot.querySelector('[data-r]').onclick=refresh;
      return;
    }
    slot.innerHTML=btn('Farzandimni olishga keldim',{variant:'soft',size:'lg',icon:'car',act:'pk'});
    slot.querySelector('[data-act="pk"]').onclick=send;
  }
  async function send(){ try{ status=await api.requestPickup(studentId); toast('So‘rov yuborildi'); render(); }catch(e){ toast(e.message||'Xato'); } }
  async function refresh(){ try{ status=await api.pickupStatus(studentId); render(); }catch(e){} }
  render();
}

async function Schedule(c){

  const today=(new Date().getDay()+6)%7;

  const monday=new Date(); monday.setDate(monday.getDate()-(today>5?today-6:today));

  function render(){
    const dayLessons=lessons.filter(l=>l.day===day).sort((a,b)=>a.period-b.period);
    const isToday=day===today && today<=5;
    const dayPicker=[0,1,2,3,4,5].map(i=>{
      const on=day===i, td=i===today&&today<=5;
      const dt=new Date(monday); dt.setDate(monday.getDate()+i);

        <div style="width:5px;height:5px;border-radius:50%;margin:0 auto;background:${td?(on?'#fff':'var(--accent)'):'transparent'}"></div></button>`;
    }).join('');
    const cards = dayLessons.length? dayLessons.map(l=>lessonCard(l,isToday)).join('') : empty('Dam olish kuni','Bu kunda darslar yo‘q.','calendar');
    c.innerHTML=`<div class="screen"><div class="scroll" style="padding-bottom:24px">

          <div class="faint" style="font-size:11.5px">${esc(l.endTime)}</div></div>
        <div class="row gap12" style="flex:1;padding:12px 14px;${st==='past'?'opacity:.6':''}">

}

function formatMeta(f){ return {test:{label:'Test',icon:'list',color:'#2563EB'},written:{label:'Yozma',icon:'edit',color:'#7C3AED'},
  file:{label:'Fayl',icon:'file',color:'#0D9488'},video:{label:'Video',icon:'video',color:'#EA580C'}}[f]||{label:f,icon:'file',color:'#64708A'}; }
function daysLeft(due){ const d=parseDate(due); if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); d.setHours(0,0,0,0); return Math.round((d-t)/864e5); }
function dueLabel(a){
  if(a.completed) return {text:'Topshirildi',color:'var(--green)'};
  const dl=daysLeft(a.dueDate);
  if(dl==null) return {text:'Muddatsiz',color:'var(--muted)'};
  if(dl<0) return a.lateAccept?{text:'Kechikkan',color:'var(--amber)'}:{text:'Muddati o‘tgan',color:'var(--red)'};
  if(dl===0) return {text:'Bugun tugaydi',color:'var(--red)'};
  if(dl===1) return {text:'Ertaga tugaydi',color:'var(--amber)'};
  return {text:dl+' kun qoldi',color:'var(--muted)'};
}

      <button class="press" data-act="rm">${icon('x',18,'var(--faint)')}</button></div>`;
  }
  function wire(){
    c.querySelector('[data-act="back"]').onclick=()=>nav.pop();
    const test=c.querySelector('[data-act="test"]'); if(test) test.onclick=async()=>{ const ok=await runTest(a); if(ok){ try{a=await api.assignment(id);}catch(e){} render(); } };
    const ans=c.querySelector('#ans'); if(ans){ ans.oninput=()=>{ $('#wc',c).textContent=ans.value.trim().split(/\s+/).filter(Boolean).length;
      c.querySelector('[data-act="sub"]').disabled = ans.value.trim().length<5||busy; }; c.querySelector('[data-act="sub"]').disabled=true; }
    const pick=c.querySelector('[data-act="pick"]'); if(pick) pick.onclick=()=>pickFile(a.format==='video');
    const rm=c.querySelector('[data-act="rm"]'); if(rm) rm.onclick=()=>{ uploaded=null; render(); };
    const sub=c.querySelector('[data-act="sub"]'); if(sub) sub.onclick=()=>submit();
  }
  function pickFile(isVideo){
    const inp=document.createElement('input'); inp.type='file'; if(isVideo) inp.accept='video/*';
    inp.onchange=async()=>{ const f=inp.files[0]; if(!f) return;
      if(f.size>20*1024*1024){ errMsg=`Fayl hajmi 20 MB dan oshmasligi kerak (${(f.size/1e6).toFixed(1)} MB).`; render(); return; }
      errMsg=null; const box=$('#upbox',c);
      box.innerHTML=`<div class="card" style="border-radius:16px;padding:14px"><div class="row gap10"><div style="flex:1;font-size:14px;font-weight:700">${esc(f.name)}</div><div id="pp" style="font-weight:800;color:var(--accent)">0%</div></div><div style="height:10px"></div>${progressBar(0,null,7)}</div>`;
      try{ const up=await api.upload(f,(p)=>{ const pc=Math.round(p*100); const e1=$('#pp',box); if(e1)e1.textContent=pc+'%'; const bar=box.querySelector('.progress>div'); if(bar)bar.style.width=pc+'%'; });
        uploaded=up; render(); }
      catch(e){ errMsg=e.message; render(); } };
    inp.click();
  }
  async function submit(){
    busy=true; errMsg=null; render();
    try{
      if(a.format==='written') await api.submitWritten(a.id, $('#ans',c)?.value.trim()||'');
      else await api.submitFile(a.id, uploaded.url);
      a=await api.assignment(id); toast('Topshirildi');
    }catch(e){ errMsg=e.message; }
    busy=false; render();
  }
  render();
}

/* Test runner — modal overlay */
function runTest(a){
  return new Promise(resolve=>{
    const qs=a.questions||[]; let idx=0; const answers={}; let result=null, submitting=false, err=null;
    const ov=el(`<div class="scrim" style="align-items:stretch;background:var(--bg)"><div class="screen" style="max-width:480px;margin:0 auto;width:100%;background:var(--bg)"></div></div>`);
    document.body.appendChild(ov);
    const root=ov.firstElementChild;
    function done(v){ ov.remove(); resolve(v); }
    function render(){
      if(result){ renderResult(); return; }
      const q=qs[idx], sel=answers[q.id], last=idx===qs.length-1;
      root.innerHTML=`<div class="row gap12" style="padding:8px 16px 12px">
        <button class="iconbtn press" data-x="1">${icon('x',20)}</button>
        <div style="flex:1">${progressBar(idx/qs.length*100)}</div>
        <div class="muted" style="font-size:13.5px;font-weight:800">${idx+1}/${qs.length}</div></div>
      <div class="scroll" style="padding:12px 20px">
        ${chip(a.subjectName,'var(--accent)')}
        <div style="font-size:21px;font-weight:800;line-height:1.35;letter-spacing:-.3px;margin:14px 0 22px">${esc(q.text)}</div>
        ${q.options.map((o,i)=>{ const on=sel===i;
          return `<button class="press" data-opt="${i}" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:16px;margin-bottom:11px;border-radius:16px;
            background:${on?'var(--accentSoft)':'var(--surface)'};border:1.5px solid ${on?'var(--accent)':'var(--border)'};${on?'':'box-shadow:var(--shadow)'}">
            <span class="badge" style="width:26px;height:26px;border-radius:8px;background:${on?'var(--accent)':'var(--surface3)'};color:${on?'#fff':'var(--muted)'};font-size:13px">${String.fromCharCode(65+i)}</span>
            <span style="flex:1;font-size:16px;font-weight:600">${esc(o)}</span></button>`; }).join('')}
      </div>
      <div style="background:var(--surface);border-top:1px solid var(--border);padding:12px 20px 20px;display:flex;gap:10px">
        ${idx>0?`<button class="btn btn-ghost btn-lg press" data-prev="1" style="width:auto;padding:0 18px">${icon('chevL',20)}</button>`:''}
        ${err?`<div style="flex:1;color:var(--red);font-size:12;font-weight:600;align-self:center">${esc(err)}</div>`:
          last? `<button class="btn btn-primary btn-lg press" data-fin="1" ${Object.keys(answers).length<qs.length||submitting?'disabled':''}>${submitting?'Yuborilmoqda…':'Yakunlash'}</button>`
              : `<button class="btn btn-primary btn-lg press" data-next="1" ${sel==null?'disabled':''}>Keyingisi</button>`}
      </div>`;
      root.querySelector('[data-x]').onclick=()=>done(false);
      root.querySelectorAll('[data-opt]').forEach(b=>b.onclick=()=>{ answers[q.id]=+b.dataset.opt; render(); });
      root.querySelector('[data-prev]')?.addEventListener('click',()=>{ idx--; render(); });
      root.querySelector('[data-next]')?.addEventListener('click',()=>{ idx++; render(); });
      root.querySelector('[data-fin]')?.addEventListener('click',grade);
    }
    async function grade(){
      submitting=true; err=null; render();
      try{ const arr=Object.entries(answers).map(([questionId,selectedIndex])=>({questionId,selectedIndex}));
        result=await api.submitTest(a.id, arr); }
      catch(e){ err=e.message; submitting=false; }
      render();
    }
    function renderResult(){
      const total=result.total||qs.length, correct=result.correctCount||0;
      const pct=total>0?Math.round(correct/total*100):0, good=pct>=60, col=good?'var(--green)':'var(--amber)';
      root.innerHTML=`<div class="center" style="flex-direction:column;padding:0 28px;text-align:center">
        ${Ring(pct,150,13,col,`<div style="font-size:40px;font-weight:800;line-height:1;color:${col}">${result.score||0}</div><div class="muted" style="font-size:12px;font-weight:700">ball</div>`)}
        <div style="font-size:23px;font-weight:800;letter-spacing:-.3px;margin-top:24px">${good?'Ajoyib ish!':'Topshirildi'}</div>
        <div class="muted" style="font-size:15px;margin-top:6px">${total} tadan <b style="color:var(--green)">${correct} ta</b> to‘g‘ri javob</div>
        <div style="height:28px"></div>${btn('Topshiriqlarga qaytish',{size:'lg',act:'back'})}</div>`;
      root.querySelector('[data-act="back"]').onclick=()=>done(true);
    }
    render();
  });
}

async function Chat(c){
  const meId=Store.user?.id;
  let msgs=[], poll=null;
  c.innerHTML=`<div class="screen">
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px 12px" class="row gap12">
      <div style="width:44px;height:44px;border-radius:14px;background:var(--accentSoft);display:flex;align-items:center;justify-content:center">${icon('chat',24,'var(--accent)')}</div>
      <div><div style="font-size:16.5px;font-weight:800">Sinf guruhi</div><div class="muted" style="font-size:12.5px">O‘qituvchilar va ma’muriyat</div></div></div>
    <div class="scroll" id="chat-list" style="padding:14px"><div class="center"><div class="spin"></div></div></div>
    <div style="background:var(--surface);border-top:1px solid var(--border);padding:10px 14px calc(12px + env(safe-area-inset-bottom))" class="row gap8">
      <input id="chat-in" placeholder="Xabar yozing…" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:22px;padding:11px 16px;outline:none;font-size:15px;font-weight:500"/>
      <button id="chat-send" class="press" style="width:44px;height:44px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex:none">${icon('send',20,'#fff')}</button></div></div>`;
  const list=$('#chat-list',c), input=$('#chat-in',c);
  const roleColor=(r)=> r==='teacher'?'var(--accent)':r==='admin'?'var(--violet)':'var(--green)';
  const roleLabel=(r)=> r==='teacher'?'O‘qituvchi':r==='admin'?'Ma’muriyat':'';
  function bubble(m,prevSame){
    const mine=m.senderUserId===meId;
    if(mine) return `<div style="display:flex;justify-content:flex-end;margin-bottom:3px"><div style="max-width:78%">
      <div style="background:var(--accent);color:#fff;padding:9px 13px;border-radius:16px 16px 5px 16px;font-size:14.5px;line-height:1.4;font-weight:500">${esc(m.text)}</div>
      <div class="faint" style="font-size:10.5px;text-align:right;padding:3px 4px 8px">${fmtTime(m.createdAt)}</div></div></div>`;
    const rc=roleColor(m.senderRole), rl=roleLabel(m.senderRole);
    return `<div style="display:flex;gap:8px;margin-bottom:3px;max-width:82%">
      <div style="width:32px;flex:none">${prevSame?'':avatar(m.senderName,32)}</div>
      <div style="min-width:0">${prevSame?'':`<div class="row gap6" style="padding:0 2px 3px"><span style="font-size:12.5px;font-weight:800;color:${rc}">${esc(m.senderName)}</span>${rl?`<span style="font-size:9.5px;font-weight:800;color:${rc};background:color-mix(in srgb,${rc} 14%,transparent);padding:1px 6px;border-radius:6px">${rl}</span>`:''}</div>`}
      <div class="card" style="padding:9px 13px;border-radius:5px 16px 16px 16px;font-size:14.5px;line-height:1.4;font-weight:500">${esc(m.text)}</div>
      <div class="faint" style="font-size:10.5px;padding:3px 2px 8px">${fmtTime(m.createdAt)}</div></div></div>`;
  }
  function paint(){
    if(!msgs.length){ list.innerHTML=empty('Xabar yo‘q','Hozircha guruhda xabar yo‘q.','chat'); return; }
    list.innerHTML=msgs.map((m,i)=>bubble(m, i>0&&msgs[i-1].senderUserId===m.senderUserId)).join('');
    mountPhotos(list); list.scrollTop=list.scrollHeight;
  }
  try{ msgs=await api.chat(); paint(); }catch(e){ list.innerHTML=empty("Yuklab bo'lmadi",e.message,'alert'); }
  async function pollNew(){ if(!msgs.length) return; try{ const since=msgs[msgs.length-1].createdAt;
    const fresh=await api.chat(since); if(fresh.length){ const known=new Set(msgs.map(m=>m.id)); const add=fresh.filter(m=>!known.has(m.id)); if(add.length){ msgs.push(...add); paint(); } } }catch(e){} }
  poll=setInterval(pollNew, 4000);
  nav._onLeave=()=>clearInterval(poll);
  async function send(){ const text=input.value.trim(); if(!text) return; input.value='';
    try{ const m=await api.sendChat(text); msgs.push(m); paint(); }catch(e){ input.value=text; toast('Yuborilmadi: '+e.message); } }
  $('#chat-send',c).onclick=send;
  input.onkeydown=(e)=>{ if(e.key==='Enter') send(); };
}

    ${sectionHeader('Fanlar bo‘yicha')}
    ${(n.subjects||[]).length?`<div class="card" style="padding:4px">${n.subjects.map((s,i)=>subjRow(s,i<n.subjects.length-1)).join('')}</div>`:`<div class="card">${empty('Ma’lumot yo‘q','','chart')}</div>`}
    ${n.disciplinePoints&&n.disciplinePoints.length?`<div style="height:16px"></div>${sectionHeader('Intizom tarixi')}
      <div class="card" style="padding:4px">${n.disciplinePoints.slice(0,8).map((r,i)=>{ const reward=r.points>=0,rc=reward?'var(--green)':'var(--red)';
        return `<div class="row gap12" style="padding:11px;${i<Math.min(8,n.disciplinePoints.length)-1?'border-bottom:1px solid var(--border)':''}">${icon(reward?'award':'alert',20,rc)}

async function Feedback(c){
  let type='suggestion', file=null, busy=false;
  function render(){
    c.innerHTML=`<div class="screen"><div class="scroll" style="padding-bottom:24px">
      ${header('Taklif va shikoyat',{back:true})}
      <div class="pad">
        <div class="seg" style="margin-bottom:16px">

        <div style="font-size:14px;font-weight:800;padding:0 2px 8px">Matn</div>
        <textarea id="fb-text" class="ta" rows="6" placeholder="Fikringizni yozing…"></textarea>
        <div style="height:14px"></div>
        <div id="fb-file">${file? `<div class="card row gap12" style="border-radius:16px;padding:13px"><div style="width:40px;height:40px;border-radius:11px;background:var(--accentSoft);display:flex;align-items:center;justify-content:center">${icon('image',20,'var(--accent)')}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(file.name)}</div></div><button class="press" data-rm="1">${icon('x',18,'var(--faint)')}</button></div>`
          : `<button class="press row gap10" data-pick="1" style="width:100%;padding:16px;background:var(--surface);border:1.5px dashed var(--borderStrong);border-radius:16px;justify-content:center">${icon('gallery',22,'var(--accent)')}<span style="font-weight:700">Rasm biriktirish (ixtiyoriy)</span></button>`}</div>
        <div style="height:16px"></div>
        ${btn(busy?'Yuborilmoqda…':'Yuborish',{size:'lg',icon:'send',act:'send',disabled:busy})}
      </div></div></div>`;
    c.querySelector('[data-act="back"]').onclick=()=>nav.pop();
    c.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{ type=b.dataset.t; render(); });
    const pick=c.querySelector('[data-pick]'); if(pick) pick.onclick=()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=()=>{ file=inp.files[0]; render(); }; inp.click(); };
    const rm=c.querySelector('[data-rm]'); if(rm) rm.onclick=()=>{ file=null; render(); };
    c.querySelector('[data-act="send"]').onclick=async()=>{
      const text=$('#fb-text',c).value.trim(); if(text.length<5){ toast('Matn juda qisqa'); return; }
      busy=true; render();
      try{ await api.sendFeedback(type,text,file); toast('Yuborildi. Rahmat!'); nav.pop(); }
      catch(e){ busy=false; toast(e.message); render(); }
    };
  }
  render();
}

/* ════════════════════════════════════════════════════════════════

   ════════════════════════════════════════════════════════════════ */
async function LocationScreen(c){
  c.innerHTML=`<div class="screen">${header('Lokatsiya',{back:true})}<div class="center"><div class="spin"></div></div></div>`;
  c.querySelector('[data-act="back"]').onclick=()=>nav.pop();
  let loc={}; try{ loc=await api.location()||{}; }catch(e){ loc={}; }
  let lat=loc.latitude??loc.lat??'', lng=loc.longitude??loc.lng??'', address=loc.address||'';
  function render(){
    const hasCoords = lat!==''&&lng!=='';
    c.innerHTML=`<div class="screen"><div class="scroll pad" style="padding-bottom:24px">
      ${header('Lokatsiya',{back:true})}
      <div class="muted" style="font-size:13.5px;line-height:1.5;margin-bottom:16px">O‘quvchining uy joylashuvi. Koordinatani qo‘lda kiriting yoki joriy joylashuvni aniqlang.</div>
      ${btn('Joriy joylashuvni aniqlash',{variant:'soft',size:'lg',icon:'crosshair',act:'gps'})}
      <div style="height:16px"></div>
      <div style="font-size:13px;font-weight:700;color:var(--muted);padding:0 2px 7px">Kenglik (lat)</div>
      <div class="field" style="margin-bottom:12px">${icon('mapPin',20,'var(--faint)')}<input id="lat" value="${esc(lat)}" placeholder="41.31" inputmode="decimal"/></div>
      <div style="font-size:13px;font-weight:700;color:var(--muted);padding:0 2px 7px">Uzunlik (lng)</div>
      <div class="field" style="margin-bottom:12px">${icon('mapPin',20,'var(--faint)')}<input id="lng" value="${esc(lng)}" placeholder="69.24" inputmode="decimal"/></div>
      <div style="font-size:13px;font-weight:700;color:var(--muted);padding:0 2px 7px">Manzil (ixtiyoriy)</div>
      <div class="field" style="margin-bottom:16px">${icon('map',20,'var(--faint)')}<input id="addr" value="${esc(address)}" placeholder="Ko‘cha, uy"/></div>
      ${hasCoords?`<a class="press row gap8" href="https://maps.google.com/?q=${lat},${lng}" target="_blank" rel="noopener" style="justify-content:center;color:var(--accent);font-weight:700;font-size:14px;margin-bottom:16px">${icon('map',18,'var(--accent)')}Xaritada ochish</a>`:''}
      ${btn('Saqlash',{size:'lg',act:'save'})}
    </div></div>`;
    c.querySelector('[data-act="back"]').onclick=()=>nav.pop();
    c.querySelector('[data-act="gps"]').onclick=()=>{ if(!navigator.geolocation){ toast('GPS qo‘llab-quvvatlanmaydi'); return; }
      toast('Aniqlanmoqda…'); navigator.geolocation.getCurrentPosition(pos=>{ lat=pos.coords.latitude.toFixed(6); lng=pos.coords.longitude.toFixed(6); render(); },()=>toast('Joylashuv aniqlanmadi')); };
    c.querySelector('[data-act="save"]').onclick=async()=>{
      const la=parseFloat($('#lat',c).value), ln=parseFloat($('#lng',c).value);
      if(isNaN(la)||isNaN(ln)){ toast('Koordinata noto‘g‘ri'); return; }
      try{ await api.updateLocation({latitude:la,longitude:ln,address:$('#addr',c).value.trim()||undefined}); toast('Saqlandi'); nav.pop(); }
      catch(e){ toast(e.message); }
    };
    ['lat','lng','addr'].forEach(id=>{ const el2=$('#'+id,c); el2.oninput=()=>{ if(id==='lat')lat=el2.value; if(id==='lng')lng=el2.value; if(id==='addr')address=el2.value; }; });
  }
  render();
}

async function BusRoute(c){
  c.innerHTML=`<div class="screen">${header('Avtobus yo‘nalishi',{back:true})}<div class="center"><div class="spin"></div></div></div>`;
  c.querySelector('[data-act="back"]').onclick=()=>nav.pop();

    const body=$('#bus-body',c); if(!body) return;
    if(!r.available || !r.buses?.length){
      body.innerHTML=`<div class="card">${empty('Avtobus ko‘rinmaydi',`Avtobuslar faqat ertalab ${r.fromHour||6}:00–${r.toHour||9}:00 oralig‘ida ko‘rinadi.`,'bus')}</div>`;

      ${b.driverName?`<div class="row sp" style="margin-top:12px"><span class="muted" style="font-size:13;font-weight:600">${esc(b.driverName)}</span>
        ${b.driverPhone?`<a class="press row gap6" href="tel:${esc(b.driverPhone.replace(/\s/g,''))}" style="color:var(--green);font-weight:700;font-size:13px">${icon('phone',16,'var(--green)')}Qo‘ng‘iroq</a>`:''}</div>`:''}
      ${b.hasCoords?`<div style="height:10px"></div><a class="press row gap8" href="https://maps.google.com/?q=${b.lat},${b.lng}" target="_blank" rel="noopener" style="justify-content:center;background:var(--surface2);border-radius:12px;padding:10px;color:var(--accent);font-weight:700;font-size:13.5px">${icon('mapPin',18,'var(--accent)')}Xaritada ko‘rish${b.speed!=null?` · ${Math.round(b.speed)} km/soat`:''}</a>`:
        `<div class="faint" style="font-size:12.5px;margin-top:10px">Signal hali kelmadi</div>`}`;

  }
  c.innerHTML=`<div class="screen"><div class="scroll pad" style="padding-bottom:24px">

    <div class="muted" style="font-size:13px;line-height:1.5;margin-bottom:14px">Maktab avtobusi ertalabki oynada (06:00–09:00) jonli ko‘rinadi. Har 8 soniyada yangilanadi.</div>
    <div id="bus-body"><div class="center"><div class="spin"></div></div></div></div></div>`;
  c.querySelector('[data-act="back"]').onclick=()=>nav.pop();
  await load();
  timer=setInterval(load, 8000);
  nav._onLeave=()=>clearInterval(timer);
}

async function Settings(c){
  let lang=Store.lang;
  function render(){
    const dark=Store.theme==='dark';
    const langs=[['uz','O‘zbek'],['ru','Русский'],['en','English']];
    const group=(title,inner)=>`<div style="margin-bottom:18px"><div class="muted" style="font-size:13px;font-weight:800;letter-spacing:.3px;padding:0 4px 8px">${title.toUpperCase()}</div>
      <div class="card" style="padding:4px;border-radius:18px">${inner}</div></div>`;
    const iconBox=(ic,color)=>`<div style="width:32px;height:32px;border-radius:9px;background:color-mix(in srgb,${color} 13%,transparent);display:flex;align-items:center;justify-content:center;flex:none">${icon(ic,17,color)}</div>`;
    c.innerHTML=`<div class="screen"><div class="scroll pad" style="padding-bottom:24px">
      ${header('Sozlamalar',{back:true})}
      ${group('Ko‘rinish',`<div class="row gap12" style="padding:12px 11px">${iconBox('moon','#7C3AED')}
        <div style="flex:1"><div style="font-size:14.5px;font-weight:700">Qorong‘i rejim</div><div class="muted" style="font-size:12px">${dark?'Yoqilgan':'O‘chirilgan'}</div></div>
        <div class="switch ${dark?'on':''} press" data-dark="1"><i></i></div></div>`)}
      ${group('Til', langs.map((l,i)=>`<button class="press row" data-lang="${l[0]}" style="width:100%;padding:13px 11px;${i<langs.length-1?'border-bottom:1px solid var(--border)':''}">
        <span style="flex:1;text-align:left;font-size:15px;font-weight:700">${l[1]}</span>${lang===l[0]?icon('check',20,'var(--accent)'):''}</button>`).join(''))}
      ${group('Bildirishnomalar',`<div class="row gap12" style="padding:12px 11px">${iconBox('bell','#EA580C')}
        <div style="flex:1"><div style="font-size:14.5px;font-weight:700">Push bildirishnoma</div><div class="muted" style="font-size:12px">Yangi baho, xabar, topshiriq</div></div>
        <div class="switch ${localStorage.getItem('lms_push')!=='off'?'on':''} press" data-push="1"><i></i></div></div>`)}
      ${group('Akkaunt',`<button class="press row gap12" data-pass="1" style="width:100%;padding:12px 11px;text-align:left">${iconBox('lock','#2563EB')}
        <span style="flex:1;font-size:14.5px;font-weight:700">Parolni o‘zgartirish</span>${icon('chevR',18,'var(--faint)')}</button>`)}
      ${group('Server',`<button class="press row gap12" data-srv="1" style="width:100%;padding:12px 11px;text-align:left">${iconBox('map','#64748B')}
        <span style="flex:1;font-size:14.5px;font-weight:700">Server manzili</span><span class="faint" style="font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(CONFIG.baseUrl.replace(/^https?:\/\//,''))}</span></button>`)}
      <div class="faint" style="text-align:center;font-size:12px">${CONFIG.appName} · versiya ${CONFIG.appVersion}</div>
    </div></div>`;
    c.querySelector('[data-act="back"]').onclick=()=>nav.pop();
    c.querySelector('[data-dark]').onclick=()=>{ Store.theme=dark?'light':'dark'; applyTheme(); render(); };
    c.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>{ lang=b.dataset.lang; Store.lang=lang; api.saveSettings({language:lang}).catch(()=>{}); render(); });
    c.querySelector('[data-push]').onclick=()=>{ const on=localStorage.getItem('lms_push')!=='off'; localStorage.setItem('lms_push',on?'off':'on'); api.saveSettings({notificationsEnabled:!on}).catch(()=>{}); render(); };
    c.querySelector('[data-pass]').onclick=()=>nav.go(AccountScreen);
    c.querySelector('[data-srv]').onclick=configSheet;
  }
  render();
}
function AccountScreen(c){
  let busy=false;
  c.innerHTML=`<div class="screen"><div class="scroll pad" style="padding-bottom:24px">
    ${header('Parolni o‘zgartirish',{back:true})}
    <div style="font-size:13px;font-weight:700;color:var(--muted);padding:0 2px 7px">Joriy parol</div>
    <div class="field" style="margin-bottom:12px">${icon('lock',20,'var(--faint)')}<input id="cur" type="password" placeholder="Joriy parol"/></div>
    <div style="font-size:13px;font-weight:700;color:var(--muted);padding:0 2px 7px">Yangi parol</div>
    <div class="field" style="margin-bottom:12px">${icon('lock',20,'var(--faint)')}<input id="new" type="password" placeholder="Kamida 8 belgi"/></div>
    <div style="font-size:13px;font-weight:700;color:var(--muted);padding:0 2px 7px">Yangi parolni takrorlang</div>
    <div class="field" style="margin-bottom:16px">${icon('lock',20,'var(--faint)')}<input id="rep" type="password" placeholder="Takror"/></div>
    <div id="ac-err" style="display:none;color:var(--red);font-size:13px;font-weight:600;margin-bottom:12px"></div>
    ${btn('Saqlash',{size:'lg',act:'save'})}
  </div></div>`;
  c.querySelector('[data-act="back"]').onclick=()=>nav.pop();
  const err=$('#ac-err',c), show=(m)=>{ err.style.display='block'; err.textContent=m; };
  c.querySelector('[data-act="save"]').onclick=async()=>{
    if(busy) return; const cur=$('#cur',c).value, nw=$('#new',c).value, rep=$('#rep',c).value;
    if(!cur||!nw){ show('Maydonlarni to‘ldiring'); return; }
    if(nw.length<8){ show('Yangi parol kamida 8 belgidan iborat bo‘lsin'); return; }
    if(nw!==rep){ show('Parollar mos kelmadi'); return; }
    busy=true; err.style.display='none'; const btnE=c.querySelector('[data-act="save"]'); btnE.disabled=true; btnE.querySelector('span').textContent='Saqlanmoqda…';
    try{ const msg=await api.changePassword(cur,nw); toast(msg||'Parol almashtirildi'); nav.pop(); }
    catch(e){ show(e.message); busy=false; btnE.disabled=false; btnE.querySelector('span').textContent='Saqlash'; }
  };
}

/* Telegram */
async function openTelegram(){
  let tg; try{ tg=await api.telegram(); }catch(e){ toast("Ma'lumot yo'q"); return; }
  if(!tg.configured){ toast('Maktab Telegram botni hali sozlamagan.'); return; }
  const link = tg.deepLink || (tg.botUsername? 'https://t.me/'+String(tg.botUsername).replace('@','') : null);
  sheet('Telegram bot', `
    <div class="muted" style="font-size:14px;line-height:1.6;margin-bottom:14px">Maktab e'lonlarini (yig'ilish, davomat, qarzdorlik) Telegram orqali oling. Botga ulanish uchun:</div>
    <div style="font-size:13.5px;line-height:1.9;margin-bottom:16px">1. «Botni ochish» tugmasini bosing<br>2. Botda «Start» bosing<br>3. Telefon raqamingizni ulashing</div>
    ${link? btn('Botni ochish',{size:'lg',icon:'telegram',act:'open'}) : '<div class="muted">Havola topilmadi</div>'}`,
    (scrim,close)=>{ $('[data-act="open"]',scrim)?.addEventListener('click',()=>{ window.open(link,'_blank'); close(); }); });
}

/* ════════════════════════════════════════════════════════════════
   THEME + BOOT
   ════════════════════════════════════════════════════════════════ */
function applyTheme(){ document.documentElement.setAttribute('data-theme', Store.theme==='dark'?'dark':'light'); }
function boot(){
  applyTheme();
  if(Store.token){ nav.tab=0; nav.stack=[]; nav.render(); }
  else showLogin();
}
boot();
</script>
