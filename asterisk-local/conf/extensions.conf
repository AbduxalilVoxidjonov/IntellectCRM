; Dialplan — IntellectCRM Call Center oqimi.
; CRM Originate: avval operator kanali (PJSIP/101) chaqiriladi, operator ko'targach
; shu kontekstda Exten=tashqi raqam (faqat raqamlar, masalan 998901234567) teriladi.
; CRM_CALL_ID kanal o'zgaruvchisi CRM'dan keladi — yozuv fayli shu nom bilan saqlanadi
; (CRM keyin /var/spool/asterisk/monitor/{callId}.wav ni topib pleyer'da beradi).

[from-internal]
; Tashqi raqam (7+ xonali) -> yozuvni boshlab GSM trunk orqali teramiz.
exten => _XXXXXXX.,1,NoOp(CRM chiquvchi: ${EXTEN} (CRM_CALL_ID=${CRM_CALL_ID}))
 same => n,Set(REC=${IF($["${CRM_CALL_ID}"!=""]?${CRM_CALL_ID}:${UNIQUEID})})
 same => n,MixMonitor(/var/spool/asterisk/monitor/${REC}.wav,b)
 same => n,Dial(PJSIP/${EXTEN}@gsm-trunk,60)
 same => n,Hangup()

; Operatorlar bir-birini ichki raqam bilan chaqira oladi (101, 102, ...).
exten => _1XX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

[from-gsm]
; KIRUVCHI qo'ng'iroq (GSM'dan) — 101-operatorga (kerak bo'lsa ring-guruh qiling:
; Dial(PJSIP/101&PJSIP/102,45) — kim birinchi ko'tarsa o'sha gaplashadi).
exten => _X.,1,NoOp(GSM kiruvchi: ${CALLERID(num)})
 same => n,Set(REC=in_${UNIQUEID})
 same => n,MixMonitor(/var/spool/asterisk/monitor/${REC}.wav,b)
 same => n,Dial(PJSIP/101,45)
 same => n,Hangup()
exten => s,1,Goto(100,1)
exten => 100,1,Dial(PJSIP/101,45)
 same => n,Hangup()
