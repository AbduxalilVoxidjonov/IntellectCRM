; PJSIP — operator ichki raqamlari + GSM gateway trunk.
; O'ZGARTIRISH KERAK: GATEWAY_IP (GSM gateway'ning lokal IP'si) va operator parollari.

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; ============ GSM GATEWAY TRUNK ============
; Ko'p GSM gateway'lar (GoIP, Yeastar, Dinstar) SIP peer sifatida ulanadi.
; GATEWAY_IP ni gateway'ning IP'siga almashtiring. Gateway autentifikatsiya talab qilsa,
; auth bo'limini oching va login/parolni kiriting.
[gsm-trunk]
type = endpoint
transport = transport-udp
context = from-gsm
disallow = all
allow = alaw
allow = ulaw
aors = gsm-trunk
;outbound_auth = gsm-auth

[gsm-trunk]
type = aor
contact = sip:GATEWAY_IP:5060

[gsm-trunk]
type = identify
endpoint = gsm-trunk
match = GATEWAY_IP

;[gsm-auth]
;type = auth
;auth_type = userpass
;username = gateway_login
;password = gateway_parol

; ============ OPERATORLAR (ichki raqamlar) ============
; Har operator kompyuter/telefoniga softphone (masalan Zoiper, MicroSIP) o'rnatib,
; shu login/parol bilan ro'yxatdan o'tadi. Yangi operator = shu 3 blokni nusxalash.
[101]
type = endpoint
transport = transport-udp
context = from-internal
disallow = all
allow = alaw
allow = ulaw
auth = 101
aors = 101

[101]
type = auth
auth_type = userpass
username = 101
password = ALMASHTIRING_101_PAROL

[101]
type = aor
max_contacts = 3

[102]
type = endpoint
transport = transport-udp
context = from-internal
disallow = all
allow = alaw
allow = ulaw
auth = 102
aors = 102

[102]
type = auth
auth_type = userpass
username = 102
password = ALMASHTIRING_102_PAROL

[102]
type = aor
max_contacts = 3
