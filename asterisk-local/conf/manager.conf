; AMI (Manager) — IntellectCRM shu port orqali qo'ng'iroq boshqaradi (TCP 5038).
; DIQQAT: 5038 portini internetga OCHMANG — CRM Tailscale/VPN IP'sidan kiradi.
[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

[crm]
; PAROLNI ALMASHTIRING! CRM .env'dagi ASTERISK_PASSWORD bilan bir xil bo'lsin.
secret = ALMASHTIRING_KUCHLI_PAROL
; Faqat CRM server IP'siga ruxsat: Tailscale IP (100.x.y.z) yoki VPN IP.
; Bir nechta bo'lsa har birini alohida qatorda yozing.
deny = 0.0.0.0/0.0.0.0
permit = 100.0.0.0/255.192.0.0
; dialplan o'qish ruxsati MUHIM — VarSet (CRM_CALL_ID) hodisalari shunga bog'liq.
read = call,originate,dialplan
write = call,originate
